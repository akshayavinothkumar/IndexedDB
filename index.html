<!DOCTYPE html>
<html>
<head>
  <title>Customer DB App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    #output {
      margin-top: 20px;
      text-align: left;
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 100px;
      background: #f9f9f9;
    }
  </style>
</head>

<body>

  <h2>Customer Database App</h2>

  <div id="control-panel" style="margin-bottom: 20px;">
    <button id="load-btn" onclick="loadDB()">Load DB</button>
    <button id="query-btn" onclick="queryDB()">Query DB</button>
    <button id="clear-btn" onclick="clearDB()">Clear DB</button>
  </div>

  <div id="notification-panel" style="margin-bottom: 20px; padding: 10px; border: 1px solid #007bff; background: #eef7ff;">
    <strong>Notification:</strong> <span id="notification">Ready</span>
  </div>

  <div id="log-panel" style="margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; height: 150px; overflow-y: auto; background: #f3f3f3; text-align: left;">
    <strong>Log (history):</strong>
    <div id="log"></div>
  </div>

  <div id="query-results" style="margin-top: 20px; border: 1px solid #28a745; padding: 10px; min-height: 120px; max-height: 250px; overflow-y: auto; background: #fcfff5; text-align: left;">
    <strong>Query Results:</strong>
    <div id="results-content">No query run yet.</div>
  </div>

  <script src="script.js"></script>

</body>
</html>
